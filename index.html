<title>OKEY UGA GLOBAL WORLD</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  width:100%;
  padding:15px;
  text-align:center;
  border-bottom:3px solid var(--gold);
}
.hero img{
  width:100%;
  height:auto;
  max-height:420px;
  object-fit:contain;   /* FIX */
}

/* INFO */
.info{
  text-align:center;
  padding:25px 20px;
}
.info h2{color:var(--gold)}

/* MOVING IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:20px auto;
}
.moving-track{
  display:flex;
  gap:15px;
  animation:slide 6s ease-in-out infinite alternate;
}
.moving-track img{
  width:80vw;
  max-width:320px;
  height:auto;
  object-fit:contain;  /* FIX */
  border:2px solid var(--gold);
  background:#000;
}
@keyframes slide{
  from{transform:translateX(-15%)}
  to{transform:translateX(15%)}
}

/* STATIC GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:10px;
}
.gallery img{
  width:100%;
  height:auto;
  object-fit:contain;   /* FIX */
  border:2px solid rgba(212,175,55,.6);
  background:#000;
}

/* FORM */
.form-box{
  max-width:750px;
  margin:40px auto;
  padding:25px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
}
label{
  display:block;
  margin-top:15px;
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
textarea{
  min-height:90px;
}
button{
  margin-top:20px;
  width:100%;
  padding:15px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

/* MAP */
.map iframe{
  width:100%;
  height:320px;
  border:2px solid rgba(212,175,55,.4);
}

/* FLOATING BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{
  background:#000;
  text-align:center;
  padding:18px;
  color:#aaa;
}

@media(max-width:600px){
  .gallery{grid-template-columns:1fr}
}
</style>
</head>
