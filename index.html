<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKEY UGA GLOBAL WORLD</title>

<style>
:root{--gold:#d4af37}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}

/* HEADER IMAGE */
.hero{
  border-bottom:3px solid var(--gold);
  padding:10px;
}
.hero img{
  width:100%;
  max-height:420px;
  object-fit:contain;
}

/* INFO */
.info{
  text-align:center;
  padding:25px 20px;
}
.info h2{color:var(--gold)}

/* MOVING IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:20px auto;
}
.moving-track{
  display:flex;
  gap:15px;
  animation:move 5s linear infinite alternate;
}
.moving-track img{
  width:90vw;
  max-width:320px;
  height:auto;
  object-fit:contain;
  border:2px solid var(--gold);
  background:#000;
}
@keyframes move{
  from{transform:translateX(-20%)}
  to{transform:translateX(20%)}
}

/* STATIC GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:10px;
}
.gallery img{
  width:100%;
  height:auto;
  object-fit:contain;
  border:2px solid rgba(212,175,55,.6);
  background:#000;
}

/* FORM */
.form-box{
  max-width:800px;
  margin:40px auto;
  padding:25px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
}
label{
  display:block;
  margin-top:14px;
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
textarea{min-height:90px}
button{
  margin-top:20px;
  width:100%;
  padding:15px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

/* MAP */
.map iframe{
  width:100%;
  height:320px;
  border:2px solid rgba(212,175,55,.4);
}

/* FLOAT BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{
  background:#000;
  text-align:center;
  padding:18px;
  color:#aaa;
}

@media(max-width:600px){
  .gallery{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- ORDER FORM -->
<div class="form-box">
<h2>Customer Order & Booking</h2>
<form onsubmit="send();return false;">

<label>Customer Name</label>
<input id="name" required>

<label>Phone Number</label>
<input id="phone" required>

<label>Customer Address</label>
<textarea id="address"></textarea>

<label>Product Category</label>
<select id="category">
<option>Tiles</option>
<option>Marble</option>
<option>Chemicals</option>
<option>Plumbing Materials</option>
<option>Installation</option>
</select>

<label>Tiles Type</label>
<select id="tiles">
<option>Spanish Tiles</option>
<option>China Tiles</option>
<option>Nigeria Tiles</option>
<option>Indian Tiles</option>
</select>

<label>Bricks</label>
<select id="bricks">
<option>South Africa</option>
<option>Nigeria</option>
</select>

<label>Home Delivery</label>
<select id="delivery">
<option>Yes</option>
<option>No</option>
</select>

<button>Send via WhatsApp</button>
</form>
</div>

<footer>© 2026 OKEY UGA GLOBAL WORLD</footer>

<a class="whatsapp" href="https://wa.me/2349126274516">WhatsApp</a>
<a class="call" href="tel:09126274516">Call</a>

<script>
function send(){
const msg =
`Customer Name: ${name.value}
Phone: ${phone.value}
Address: ${address.value}
Category: ${category.value}
Tiles: ${tiles.value}
Bricks: ${bricks.value}
Delivery: ${delivery.value}`;
window.open("https://wa.me/2349126274516?text="+encodeURIComponent(msg),"_blank");
}
</script>
